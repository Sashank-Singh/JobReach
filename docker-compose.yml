services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: jobreach
      POSTGRES_PASSWORD: jobreach
      POSTGRES_DB: jobreach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobreach -d jobreach"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  job-api:
    build:
      context: ./services/job-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobreach:jobreach@postgres:5432/jobreach
      DATABASE_URL_SYNC: postgresql://jobreach:jobreach@postgres:5432/jobreach
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./services/job-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://jobreach:jobreach@postgres:5432/jobreach
      DATABASE_URL_SYNC: postgresql://jobreach:jobreach@postgres:5432/jobreach
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info

  beat:
    build:
      context: ./services/job-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://jobreach:jobreach@postgres:5432/jobreach
      DATABASE_URL_SYNC: postgresql://jobreach:jobreach@postgres:5432/jobreach
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=info

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://job-api:8000
    depends_on:
      - job-api

volumes:
  postgres_data:
