services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: jobreach
      POSTGRES_PASSWORD: jobreach
      POSTGRES_DB: jobreach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobreach -d jobreach"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  job-api:
    build:
      context: ./services/job-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobreach:jobreach@postgres:5432/jobreach
      DATABASE_URL_SYNC: postgresql://jobreach:jobreach@postgres:5432/jobreach
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  referral-api:
    build:
      context: ./services/referral-api
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://jobreach:jobreach@postgres:5432/jobreach
      CORS_ORIGINS: http://localhost:3000
      JOB_API_URL: http://job-api:8000
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      DAILY_LINKEDIN_SEND_LIMIT: 20
    depends_on:
      postgres:
        condition: service_healthy
      job-api:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload"

  worker:
    build:
      context: ./services/job-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://jobreach:jobreach@postgres:5432/jobreach
      DATABASE_URL_SYNC: postgresql://jobreach:jobreach@postgres:5432/jobreach
      REDIS_URL: redis://redis:6379/0
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info

  beat:
    build:
      context: ./services/job-api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://jobreach:jobreach@postgres:5432/jobreach
      DATABASE_URL_SYNC: postgresql://jobreach:jobreach@postgres:5432/jobreach
      REDIS_URL: redis://redis:6379/0
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=info

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_REFERRAL_API_URL: http://localhost:8001
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://job-api:8000
      NEXT_PUBLIC_REFERRAL_API_URL: http://referral-api:8001
    depends_on:
      - job-api
      - referral-api

volumes:
  postgres_data:
